events {}

http {
  upstream accounting_standards {
    server accounting-standards-service:8001;
  }

  upstream business_logic {
    server business-logic-service:8002;
  }

  upstream data_ingestion {
    server data-ingestion-service:8003;
  }

  upstream fluctuation_analysis {
    server fluctuation-analysis-service:8004;
  }

  upstream classification_ai {
    server classification-ai-service:8005;
  }

  upstream nlp_processing {
    server nlp-processing-service:8006;
  }

  upstream reclassification {
    server reclassification-service:8007;
  }

  upstream workflow_orchestration {
    server workflow-orchestration-service:8008;
  }

  upstream audit_compliance {
    server audit-compliance-service:8009;
  }

  upstream security_auth {
    server security-auth-service:8010;
  }

  upstream client_configuration {
    server client-configuration-service:8011;
  }

  upstream frontend {
    server frontend:5173;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /accounting-standards-service/ {
      proxy_pass http://accounting_standards/;
    }

    location /business-logic-service/ {
      proxy_pass http://business_logic/;
    }

    location /data-ingestion-service/ {
      proxy_pass http://data_ingestion/;
    }

    location /fluctuation-analysis-service/ {
      proxy_pass http://fluctuation_analysis/;
    }

    location /classification-ai-service/ {
      proxy_pass http://classification_ai/;
    }

    location /nlp-processing-service/ {
      proxy_pass http://nlp_processing/;
    }

    location /reclassification-service/ {
      proxy_pass http://reclassification/;
    }

    location /workflow-orchestration-service/ {
      proxy_pass http://workflow_orchestration/;
    }

    location /audit-compliance-service/ {
      proxy_pass http://audit_compliance/;
    }

    location /security-auth-service/ {
      proxy_pass http://security_auth/;
    }

    location /client-configuration-service/ {
      proxy_pass http://client_configuration/;
    }
  }
}
